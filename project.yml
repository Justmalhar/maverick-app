name: Maverick
options:
  bundleIdPrefix: com.malhar
  deploymentTarget:
    macOS: "13.0"
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.1.2"
  LaTeXSwiftUI:
    url: https://github.com/colinc86/LaTeXSwiftUI
    from: "1.3.0"
  MaverickProtocol:
    path: shared
  MaverickNoise:
    path: MaverickNoise

targets:
  MaverickAgent:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: server/Sources
      - path: server/Resources/Assets.xcassets
    dependencies:
      - package: MaverickProtocol
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.malhar.MaverickAgent
      INFOPLIST_FILE: server/Info.plist
      CODE_SIGN_ENTITLEMENTS: server/MaverickAgent.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MaverickAgentTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources: server/Tests
    dependencies:
      - target: MaverickAgent
      - package: MaverickProtocol
    settings:
      GENERATE_INFOPLIST_FILE: YES

  MaverickRemote:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: client/Sources
      - path: client/Resources/Fonts/MesloLGS NF Regular.ttf
        buildPhase: resources
      - path: client/Resources/Fonts/MesloLGS NF Bold.ttf
        buildPhase: resources
      - path: client/Resources/Fonts/MesloLGS NF Italic.ttf
        buildPhase: resources
      - path: client/Resources/Fonts/MesloLGS NF Bold Italic.ttf
        buildPhase: resources
      - path: client/Resources/Themes
        type: folder
      - path: client/Resources/Agents.xcassets
    dependencies:
      - package: SwiftTerm
      - package: MaverickProtocol
      - package: MaverickNoise
      - package: MarkdownUI
        product: MarkdownUI
      - package: Highlightr
        product: Highlightr
      - package: LaTeXSwiftUI
        product: LaTeXSwiftUI
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.malhar.MaverickRemote
      INFOPLIST_FILE: client/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MaverickRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources: client/Tests
    dependencies:
      - target: MaverickRemote
      - package: MaverickProtocol
      - package: MaverickNoise
    settings:
      GENERATE_INFOPLIST_FILE: YES

schemes:
  MaverickAgent:
    build:
      targets:
        MaverickAgent: all
    test:
      targets: [MaverickAgentTests]
  MaverickRemote:
    build:
      targets:
        MaverickRemote: all
    test:
      targets: [MaverickRemoteTests]
